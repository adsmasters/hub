<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Passwort setzen – Adsmasters Tools</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0e1016;color:#f4f5f7;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{background:#171a22;border:1px solid #2a2f3a;border-radius:16px;padding:34px;width:100%;max-width:380px;box-shadow:0 24px 60px rgba(0,0,0,.4)}
  h1{font-size:20px;margin-bottom:4px}
  .sub{font-size:13px;color:#9aa3b2;margin-bottom:22px}
  label{display:block;font-size:12px;color:#9aa3b2;margin:0 0 6px}
  input{width:100%;background:#1e222c;border:1px solid #2a2f3a;border-radius:10px;padding:11px 13px;color:#f4f5f7;font-size:14px;outline:none;margin-bottom:14px}
  input:focus{border-color:#6366f1}
  .btn{width:100%;background:#4f46e5;color:#fff;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:600;cursor:pointer}
  .btn:hover{background:#4338ca}
  .btn:disabled{opacity:.6}
  .msg{font-size:13px;margin-top:14px;padding:9px 12px;border-radius:8px;display:none}
  .msg.err{background:#3b1320;color:#fca5a5;display:block}
  .msg.ok{background:#0f2e22;color:#6ee7b7;display:block}
</style>
</head>
<body>
<div class="card">
  <h1>Passwort setzen</h1>
  <div class="sub" id="who">Lege dein Passwort für die Adsmasters Tools fest.</div>
  <div id="form" style="display:none">
    <label>Neues Passwort</label>
    <input id="pw1" type="password" placeholder="mindestens 8 Zeichen" autocomplete="new-password">
    <label>Passwort wiederholen</label>
    <input id="pw2" type="password" placeholder="••••••••" autocomplete="new-password">
    <button class="btn" id="save">Passwort speichern</button>
  </div>
  <div class="msg" id="msg"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  'use strict';
  var SB_URL='https://lgrnmiszhhahfcmctmwo.supabase.co';
  var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxncm5taXN6aGhhaGZjbWN0bXdvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NjE2NDksImV4cCI6MjA4OTIzNzY0OX0.FDZRGMESves7XbAMs_oMLWmvnywMlVqe8p7f1kt06qk';
  var sb=window.supabase.createClient(SB_URL,SB_KEY,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true}});
  var msg=document.getElementById('msg'),form=document.getElementById('form'),who=document.getElementById('who');
  function show(t,ok){msg.textContent=t;msg.className='msg '+(ok?'ok':'err');}

  // Recovery-Token aus URL → Session aufbauen (detectSessionInUrl erledigt das)
  function check(){
    sb.auth.getSession().then(function(r){
      if(r.data&&r.data.session){
        who.textContent='Angemeldet als '+r.data.session.user.email+'. Lege jetzt dein Passwort fest.';
        form.style.display='block';
      } else {
        show('Link ungültig oder abgelaufen. Bitte über „Passwort vergessen?" einen neuen anfordern.');
      }
    });
  }
  sb.auth.onAuthStateChange(function(){ check(); });
  setTimeout(check, 600);

  document.getElementById('save').addEventListener('click', function(){
    var p1=document.getElementById('pw1').value, p2=document.getElementById('pw2').value;
    if(p1.length<8){show('Passwort muss mindestens 8 Zeichen haben.');return;}
    if(p1!==p2){show('Die Passwörter stimmen nicht überein.');return;}
    var b=document.getElementById('save');b.disabled=true;b.textContent='Speichern…';
    sb.auth.updateUser({password:p1}).then(function(res){
      if(res.error) throw res.error;
      show('Passwort gesetzt! Du wirst weitergeleitet…',true);
      setTimeout(function(){ location.href='./'; },1200);
    }).catch(function(e){ show('Fehler: '+(e.message||e)); b.disabled=false;b.textContent='Passwort speichern'; });
  });
})();
</script>
</body>
</html>
