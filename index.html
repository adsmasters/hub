<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adsmasters Tools</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0e1016; --surface:#171a22; --surface2:#1e222c; --border:#2a2f3a;
    --text:#f4f5f7; --muted:#9aa3b2; --primary:#6366f1; --primary2:#4f46e5; --ok:#10b981;
  }
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1120px;margin:0 auto;padding:28px 24px 60px}

  /* Header */
  .top{display:flex;align-items:center;gap:12px;margin-bottom:36px}
  .brand{font-size:18px;font-weight:800;letter-spacing:-.3px}
  .brand span{color:var(--primary)}
  .top .right{margin-left:auto;display:flex;align-items:center;gap:14px;font-size:13px;color:var(--muted)}
  .btn-out{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:8px;font-size:13px;cursor:pointer}
  .btn-out:hover{border-color:#3a4150}

  /* Login */
  .login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:34px;width:100%;max-width:380px;box-shadow:0 24px 60px rgba(0,0,0,.4)}
  .login-card h1{font-size:20px;margin-bottom:4px}
  .login-card .sub{font-size:13px;color:var(--muted);margin-bottom:22px}
  label{display:block;font-size:12px;color:var(--muted);margin:0 0 6px}
  input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 13px;color:var(--text);font-size:14px;outline:none}
  input:focus{border-color:var(--primary)}
  .field{margin-bottom:14px}
  .btn{width:100%;background:var(--primary2);color:#fff;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s}
  .btn:hover{background:#4338ca}
  .btn:disabled{opacity:.6;cursor:default}
  .msg{font-size:13px;margin-top:14px;padding:9px 12px;border-radius:8px;display:none}
  .msg.err{background:#3b1320;color:#fca5a5;display:block}
  .msg.ok{background:#0f2e22;color:#6ee7b7;display:block}
  .forgot{display:block;text-align:center;margin-top:14px;font-size:12px;color:var(--muted);cursor:pointer}
  .forgot:hover{color:var(--text)}
  .hint{margin-top:18px;padding-top:16px;border-top:1px solid var(--border);font-size:12px;color:var(--muted);line-height:1.6;text-align:center}
  .hint b{color:var(--text)}

  /* Grid */
  .hello{font-size:26px;font-weight:800;letter-spacing:-.4px;margin-bottom:4px}
  .hello-sub{color:var(--muted);font-size:14px;margin-bottom:30px}
  .section-label{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:700;margin:30px 0 14px;display:flex;align-items:center;gap:8px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
  .tool{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;display:flex;flex-direction:column;gap:10px;transition:transform .12s,border-color .12s,background .12s;cursor:pointer;position:relative;overflow:hidden}
  .tool:hover{transform:translateY(-3px);border-color:var(--primary);background:var(--surface2)}
  .tool .ic{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:22px;background:var(--surface2)}
  .tool h3{font-size:15px;font-weight:700}
  .tool p{font-size:13px;color:var(--muted);line-height:1.5;flex:1}
  .tool .foot{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
  .pill{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;letter-spacing:.03em}
  .pill.sso{background:rgba(16,185,129,.15);color:#6ee7b7}
  .pill.own{background:rgba(148,163,184,.15);color:#cbd5e1}
  .open{font-size:13px;color:var(--primary);font-weight:600}
  .tool.soon{opacity:.55;cursor:default}
  .tool.soon:hover{transform:none;border-color:var(--border);background:var(--surface)}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen" style="display:none">
  <div class="login-card">
    <h1>Adsmasters <span style="color:var(--primary)">Tools</span></h1>
    <div class="sub">Ein Login für alle internen Tools.</div>
    <div class="field"><label>E-Mail</label><input id="email" type="email" placeholder="name@adsmasters.de" autocomplete="username"></div>
    <div class="field"><label>Passwort</label><input id="pw" type="password" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="btn" id="loginBtn">Anmelden</button>
    <a class="forgot" id="forgot">Passwort vergessen?</a>
    <div class="msg" id="msg"></div>
    <div class="hint">Kein Konto? Es gibt keine Selbstregistrierung – melde dich bei <b>Tobias</b>, er legt dich im Tool an.</div>
  </div>
</div>

<!-- HUB -->
<div class="wrap" id="hub" style="display:none">
  <div class="top">
    <div class="brand">Adsmasters <span>Tools</span></div>
    <div class="right">
      <span id="userEmail"></span>
      <button class="btn-out" id="logout">Abmelden</button>
    </div>
  </div>

  <div class="hello">Willkommen 👋</div>
  <div class="hello-sub">Wähle ein Tool. Tools mit <b style="color:#6ee7b7">SSO</b> öffnen ohne erneuten Login.</div>

  <div class="section-label">Gemeinsamer Login (SSO)</div>
  <div class="grid" id="gridSso"></div>

  <div class="section-label">Eigener Login</div>
  <div class="grid" id="gridOwn"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  'use strict';
  // Geteiltes Supabase-Projekt (gleiche Origin + gleiches Projekt = geteilte Session
  // mit allen GitHub-Pages-Tools auf adsmasters.github.io)
  var SB_URL = 'https://lgrnmiszhhahfcmctmwo.supabase.co';
  var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxncm5taXN6aGhhaGZjbWN0bXdvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NjE2NDksImV4cCI6MjA4OTIzNzY0OX0.FDZRGMESves7XbAMs_oMLWmvnywMlVqe8p7f1kt06qk';
  var sb = window.supabase.createClient(SB_URL, SB_KEY, { auth: { persistSession: true, autoRefreshToken: true } });

  // ── Tool-Katalog ──────────────────────────────────────────────────────
  var TOOLS = [
    // SSO: GitHub-Pages-Tools auf demselben Supabase-Projekt
    { ic:'🔎', name:'SQPR-Analyse',        desc:'Suchanfrage-Leistung & Markenanteile aus der Markenanalyse.', url:'https://adsmasters.github.io/sqpr-tool/', sso:true },
    { ic:'📦', name:'Vendor Analytics',    desc:'Vendor-Kennzahlen & Auswertungen.',                          url:'https://adsmasters.github.io/vendor-analytics/', sso:true },
    { ic:'⏱️', name:'Stunden & Kapazität', desc:'Zeiterfassung, Auslastung & Kapazitätsplanung je Mitarbeiter.', url:'https://adsmasters.github.io/stunden-uberblick/', sso:true },
    { ic:'📊', name:'Management',          desc:'Profitabilität, Umsatz, MA-Umsatz & Kapazität (nur Leitung).', url:'https://adsmasters.github.io/management/', sso:true, gf:true },
    { ic:'📝', name:'Content Tracker',     desc:'Content-Änderungen auf Amazon überwachen.',                  url:'https://adsmasters.github.io/content-tracker/', sso:true },
    { ic:'🎯', name:'PPC-Tools (intern)',  desc:'ASIN-Optimizer, Audit, Bid-Optimizer, Harvesting & mehr.',   url:'https://adsmasters.github.io/ppc-tools/dashboard.html', sso:true },
    // Eigener Login (andere Projekte / Hosting)
    { ic:'🏷️', name:'Buy-Box Monitor',     desc:'Buy-Box-Wechsel, Preise & Seller je Kunde (Keepa).',         url:'https://buybox-monitor-adsmasters-projects.vercel.app/', sso:false },
    { ic:'🖼️', name:'Image Studio',        desc:'KI-Produktbilder für Amazon.',                               url:'https://image-studio-lime-alpha.vercel.app/dashboard', sso:false },
  ];

  var loginScreen = document.getElementById('loginScreen');
  var hub = document.getElementById('hub');
  var msg = document.getElementById('msg');

  function showMsg(text, ok){ msg.textContent = text; msg.className = 'msg ' + (ok?'ok':'err'); }

  function card(t){
    var soon = t.soon || !t.url;
    var el = document.createElement(soon ? 'div' : 'a');
    el.className = 'tool' + (soon ? ' soon' : '');
    if (!soon){ el.href = t.url; if (!t.sso) el.target = '_blank'; el.rel='noopener'; }
    el.innerHTML =
      '<div class="ic">'+t.ic+'</div>'+
      '<h3>'+t.name+'</h3>'+
      '<p>'+t.desc+'</p>'+
      '<div class="foot">'+
        '<span class="pill '+(t.sso?'sso':'own')+'">'+(t.sso?'SSO':'eigener Login')+'</span>'+
        '<span class="open">'+(soon?'bald':'Öffnen →')+'</span>'+
      '</div>';
    return el;
  }

  // Nur diese E-Mails sehen GF-Tools (z.B. Management/Profitabilität)
  var GF_EMAILS = ['hallo@adsmasters.de', 'hallo@tobias-dziuba.de'];

  function renderHub(session){
    var email = (session.user.email || '').toLowerCase();
    var isGf = GF_EMAILS.indexOf(email) !== -1;
    document.getElementById('userEmail').textContent = session.user.email;
    var gs = document.getElementById('gridSso'), go = document.getElementById('gridOwn');
    gs.innerHTML=''; go.innerHTML='';
    TOOLS.forEach(function(t){
      if (t.gf && !isGf) return; // GF-only Tools für Mitarbeiter ausblenden
      (t.sso?gs:go).appendChild(card(t));
    });
    loginScreen.style.display='none';
    hub.style.display='block';
  }
  function showLogin(){ hub.style.display='none'; loginScreen.style.display='flex'; document.getElementById('email').focus(); }

  // ── Session prüfen ──
  sb.auth.getSession().then(function(r){
    if (r.data && r.data.session) renderHub(r.data.session); else showLogin();
  });

  // ── Login ──
  function doLogin(){
    var email=document.getElementById('email').value.trim();
    var pw=document.getElementById('pw').value;
    if(!email||!pw){ showMsg('Bitte E-Mail und Passwort eingeben.'); return; }
    var btn=document.getElementById('loginBtn'); btn.disabled=true; btn.textContent='Anmelden…';
    sb.auth.signInWithPassword({email:email,password:pw}).then(function(res){
      if(res.error) throw res.error;
      renderHub(res.data.session);
    }).catch(function(){
      showMsg('E-Mail oder Passwort falsch.'); btn.disabled=false; btn.textContent='Anmelden';
    });
  }
  document.getElementById('loginBtn').addEventListener('click', doLogin);
  document.getElementById('pw').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
  document.getElementById('email').addEventListener('keydown', function(e){ if(e.key==='Enter') document.getElementById('pw').focus(); });

  document.getElementById('forgot').addEventListener('click', function(){
    var email=document.getElementById('email').value.trim();
    if(!email){ showMsg('Bitte zuerst deine E-Mail eingeben.'); return; }
    sb.auth.resetPasswordForEmail(email, { redirectTo: new URL('set-password.html', location.href).href }).then(function(res){
      if(res.error) throw res.error;
      showMsg('Reset-Link gesendet an '+email+'.', true);
    }).catch(function(){ showMsg('Reset-Link konnte nicht gesendet werden.'); });
  });

  document.getElementById('logout').addEventListener('click', function(){
    sb.auth.signOut().finally(showLogin);
  });
})();
</script>
</body>
</html>
